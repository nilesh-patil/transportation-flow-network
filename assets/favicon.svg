<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Transportation flow network glyph">
  <rect width="32" height="32" rx="5" fill="#fffff8"/>
  <!-- directed edges: peripheral nodes flowing into a dominant hub -->
  <g stroke="#595959" stroke-width="1.4" fill="none" stroke-linecap="round">
    <line x1="6"  y1="7"  x2="18" y2="15"/>
    <line x1="6"  y1="25" x2="18" y2="17"/>
    <line x1="26" y1="6"  x2="20" y2="14"/>
    <line x1="27" y1="26" x2="21" y2="18"/>
  </g>
  <!-- one accented backbone edge -->
  <line x1="6" y1="16" x2="17.5" y2="16" stroke="#a32015" stroke-width="1.6" stroke-linecap="round"/>
  <!-- peripheral nodes -->
  <g fill="#2c7fb8">
    <circle cx="6"  cy="7"  r="2.4"/>
    <circle cx="6"  cy="16" r="2.4"/>
    <circle cx="6"  cy="25" r="2.4"/>
    <circle cx="26" cy="6"  r="2.4"/>
    <circle cx="27" cy="26" r="2.4"/>
  </g>
  <!-- dominant Midtown-style hub -->
  <circle cx="19" cy="16" r="4.4" fill="#b2182b"/>
</svg>
